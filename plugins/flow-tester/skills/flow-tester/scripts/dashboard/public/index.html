<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>flow-tester · live</title>
<style>
  :root {
    --bg: #0b0d12; --panel: #141821; --panel-2: #1b212d; --line: #232b3a;
    --text: #e6e9ef; --muted: #8b93a7; --accent: #5b8cff;
    --crit: #ff5470; --high: #ff9f43; --med: #ffd166; --low: #6ee7b7; --ok: #3ddc97; --sec: #b48cff;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 18px; padding: 12px 18px; background: var(--panel); border-bottom: 1px solid var(--line); }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
  header .dot.live { background: var(--ok); box-shadow: 0 0 10px var(--ok); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  h1 { font-size: 15px; margin: 0; letter-spacing: .3px; font-weight: 600; }
  h1 span { color: var(--accent); }
  .meta { display: flex; gap: 22px; margin-left: auto; font-size: 12px; color: var(--muted); }
  .meta b { color: var(--text); font-weight: 600; }
  main { flex: 1; display: grid; grid-template-columns: 1.55fr 1fr; gap: 1px; background: var(--line); min-height: 0; }
  .view, .side { background: var(--bg); min-height: 0; display: flex; flex-direction: column; }
  .view { padding: 14px; }
  .view .frame { flex: 1; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .view img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .view .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px; }
  .view .caption { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 8px; min-height: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tabs { display: flex; gap: 2px; padding: 10px 10px 0; background: var(--bg); }
  .tab { padding: 7px 13px; font-size: 12.5px; color: var(--muted); cursor: pointer; border-radius: 8px 8px 0 0; border: 1px solid transparent; }
  .tab.active { color: var(--text); background: var(--panel); border-color: var(--line); border-bottom-color: var(--panel); }
  .tab .count { display: inline-block; min-width: 17px; text-align: center; font-size: 11px; background: var(--panel-2); border-radius: 9px; padding: 0 5px; margin-left: 6px; color: var(--muted); }
  .panes { flex: 1; background: var(--panel); border-top: 1px solid var(--line); overflow-y: auto; padding: 12px; }
  .pane { display: none; }
  .pane.active { display: block; }
  .card { background: var(--panel-2); border: 1px solid var(--line); border-left-width: 3px; border-radius: 8px; padding: 10px 12px; margin-bottom: 9px; }
  .card .row { display: flex; align-items: center; gap: 8px; }
  .card .title { font-weight: 600; font-size: 13.5px; }
  .card .detail { color: var(--muted); font-size: 12.5px; margin-top: 5px; line-height: 1.45; }
  .card .where { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
  .tag { font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; padding: 2px 7px; border-radius: 6px; font-weight: 700; }
  .sev-critical { color: var(--crit); border-left-color: var(--crit) !important; } .bg-critical { background: rgba(255,84,112,.16); color: var(--crit); }
  .sev-high { color: var(--high); border-left-color: var(--high) !important; } .bg-high { background: rgba(255,159,67,.16); color: var(--high); }
  .sev-medium { border-left-color: var(--med) !important; } .bg-medium { background: rgba(255,209,102,.16); color: var(--med); }
  .sev-low { border-left-color: var(--low) !important; } .bg-low { background: rgba(110,231,183,.16); color: var(--low); }
  .cat { background: var(--panel); color: var(--muted); }
  .conf { margin-left: auto; font-size: 10.5px; color: var(--muted); }
  .step { display: flex; gap: 8px; align-items: baseline; font-size: 12.5px; padding: 5px 2px; border-bottom: 1px solid var(--line); }
  .step .v { font-family: var(--mono); font-size: 10px; padding: 1px 6px; border-radius: 5px; }
  .v.pass { background: rgba(61,220,151,.16); color: var(--ok); } .v.fail { background: rgba(255,84,112,.16); color: var(--crit); }
  .log { font-family: var(--mono); font-size: 11.5px; color: var(--muted); padding: 2px 0; white-space: pre-wrap; word-break: break-word; }
  .flow-item { font-size: 12.5px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .flow-item b { color: var(--accent); }
  .flow-item ol { margin: 6px 0 0; padding-left: 18px; color: var(--muted); }
  .empty-pane { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 10px; }
  .sec-tag { color: var(--sec); }
</style>
</head>
<body>
  <header>
    <div class="dot" id="dot"></div>
    <h1>flow<span>·</span>tester</h1>
    <div class="meta">
      <div>mode <b id="m-mode">—</b></div>
      <div>phase <b id="m-phase">—</b></div>
      <div>target <b id="m-target">—</b></div>
      <div>bugs <b id="m-bugs" style="color:var(--high)">0</b></div>
      <div>security <b id="m-sec" class="sec-tag">0</b></div>
    </div>
  </header>

  <main>
    <section class="view">
      <div class="frame" id="frame"><div class="empty">Waiting for the browser…<br/>the live view appears here once testing starts.</div></div>
      <div class="caption" id="caption"></div>
    </section>

    <section class="side">
      <div class="tabs">
        <div class="tab active" data-pane="bugs">Bugs<span class="count" id="c-bugs">0</span></div>
        <div class="tab" data-pane="security">Security<span class="count" id="c-security">0</span></div>
        <div class="tab" data-pane="flows">Flows</div>
        <div class="tab" data-pane="steps">Steps<span class="count" id="c-steps">0</span></div>
        <div class="tab" data-pane="logs">Logs</div>
      </div>
      <div class="panes">
        <div class="pane active" id="p-bugs"><div class="empty-pane">No bugs yet.</div></div>
        <div class="pane" id="p-security"><div class="empty-pane">No security findings yet.</div></div>
        <div class="pane" id="p-flows"><div class="empty-pane">Flows appear here once discovered.</div></div>
        <div class="pane" id="p-steps"><div class="empty-pane">No steps run yet.</div></div>
        <div class="pane" id="p-logs"><div class="empty-pane">No logs yet.</div></div>
      </div>
    </section>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
const counts = { bugs: 0, security: 0, steps: 0 };

function clearEmpty(pane) { const e = pane.querySelector(".empty-pane"); if (e) e.remove(); }

document.querySelectorAll(".tab").forEach((t) => t.onclick = () => {
  document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
  document.querySelectorAll(".pane").forEach((x) => x.classList.remove("active"));
  t.classList.add("active");
  $("p-" + t.dataset.pane).classList.add("active");
});

function setFrame(dataUrl, caption) {
  const f = $("frame");
  let img = f.querySelector("img");
  if (!img) { f.innerHTML = ""; img = document.createElement("img"); f.appendChild(img); }
  img.src = dataUrl;
  if (caption != null) $("caption").textContent = caption;
}

function addBug(e) {
  const pane = $("p-bugs"); clearEmpty(pane);
  const sev = e.severity || "medium";
  const card = document.createElement("div");
  card.className = "card sev-" + sev;
  card.innerHTML =
    `<div class="row"><span class="tag bg-${sev}">${esc(sev)}</span>` +
    `<span class="tag cat">${esc(e.category || "bug")}</span>` +
    `<span class="title">${esc(e.title || "Bug")}</span>` +
    (e.confidence ? `<span class="conf">conf: ${esc(e.confidence)}</span>` : "") + `</div>` +
    (e.detail ? `<div class="detail">${esc(e.detail)}</div>` : "") +
    ((e.flow || e.step) ? `<div class="where">${esc(e.flow || "")}${e.step ? " › " + esc(e.step) : ""}</div>` : "") +
    (e.screenshot ? `<div class="where">📸 ${esc(e.screenshot)}</div>` : "");
  pane.prepend(card);
  counts.bugs++; $("c-bugs").textContent = counts.bugs; $("m-bugs").textContent = counts.bugs;
}

function addSecurity(e) {
  const pane = $("p-security"); clearEmpty(pane);
  const sev = e.severity || "medium";
  const card = document.createElement("div");
  card.className = "card sev-" + sev;
  card.innerHTML =
    `<div class="row"><span class="tag bg-${sev}">${esc(sev)}</span>` +
    `<span class="tag cat">${esc(e.category || "security")}</span>` +
    `<span class="title">${esc(e.title || "Finding")}</span>` +
    (e.confidence ? `<span class="conf">conf: ${esc(e.confidence)}</span>` : "") + `</div>` +
    (e.detail ? `<div class="detail">${esc(e.detail)}</div>` : "") +
    (e.file ? `<div class="where">${esc(e.file)}${e.line ? ":" + esc(e.line) : ""}</div>` : "");
  pane.prepend(card);
  counts.security++; $("c-security").textContent = counts.security; $("m-sec").textContent = counts.security;
}

function addStep(e) {
  const pane = $("p-steps"); clearEmpty(pane);
  const v = (e.verdict || "").toLowerCase();
  const row = document.createElement("div");
  row.className = "step";
  row.innerHTML = (v ? `<span class="v ${v === "pass" ? "pass" : "fail"}">${esc(v)}</span>` : `<span class="v">·</span>`) +
    `<span>${esc(e.flow ? e.flow + " › " : "")}${esc(e.step || e.action || "step")}</span>`;
  pane.prepend(row);
  counts.steps++; $("c-steps").textContent = counts.steps;
}

function addLog(e) {
  const pane = $("p-logs"); clearEmpty(pane);
  const d = document.createElement("div");
  d.className = "log";
  d.textContent = `${(e.ts || "").slice(11, 19)}  ${e.message ?? ""}`;
  pane.prepend(d);
}

function renderFlows(flows) {
  const pane = $("p-flows"); pane.innerHTML = "";
  if (!flows || !flows.length) { pane.innerHTML = `<div class="empty-pane">No flows yet.</div>`; return; }
  for (const f of flows) {
    const div = document.createElement("div");
    div.className = "flow-item";
    const steps = (f.steps || []).map((s) => `<li>${esc(s.action)} — ${esc(s.target || "")}${s.expect ? ` <i style="color:#5b8cff">→ ${esc(s.expect)}</i>` : ""}</li>`).join("");
    div.innerHTML = `<b>${esc(f.title || f.id)}</b><ol>${steps}</ol>`;
    pane.appendChild(div);
  }
}

function apply(e) {
  switch (e.type) {
    case "frame": setFrame(e.data, e.caption); break;
    case "shot": if (e.data) setFrame(e.data, e.caption || e.url); break;
    case "mode": $("m-mode").textContent = e.mode || "—"; break;
    case "phase": $("m-phase").textContent = e.phase || "—"; break;
    case "target": $("m-target").textContent = e.target || "—"; break;
    case "flows": renderFlows(e.flows); break;
    case "bug": addBug(e); break;
    case "security": addSecurity(e); break;
    case "step": addStep(e); break;
    case "log": addLog(e); break;
  }
}

function applySnapshot(s) {
  if (!s) return;
  if (s.mode) $("m-mode").textContent = s.mode;
  if (s.phase) $("m-phase").textContent = s.phase;
  if (s.target) $("m-target").textContent = s.target;
  if (s.flows) renderFlows(s.flows);
  (s.bugs || []).forEach(addBug);
  (s.security || []).forEach(addSecurity);
  (s.steps || []).forEach(addStep);
  (s.logs || []).forEach(addLog);
}

let snapshotApplied = false;
const ev = new EventSource("/events");
ev.onopen = () => $("dot").classList.add("live");
ev.onerror = () => $("dot").classList.remove("live");
ev.onmessage = (m) => {
  let e; try { e = JSON.parse(m.data); } catch { return; }
  if (e.type === "snapshot") { if (!snapshotApplied) { applySnapshot(e.state); snapshotApplied = true; } return; }
  if (snapshotApplied || e.type === "frame") apply(e);
};
</script>
</body>
</html>
